# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.8.2
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.31.2

clusterName: ${clusterName}
endpoint: https://${clusterName}.${clusterDNSSuffix}:6443
clusterPodNets:
  - 10.69.0.0/16
clusterSvcNets:
  - 10.96.0.0/16
additionalApiServerCertSans: &sans
  - ${clusterEndpointIP}
  - dev-cluster.${clusterDNSSuffix}
  - 127.0.0.1
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium.
cniConfig:
  name: none

nodes:
  - hostname: k8s-dev-1
    ipAddress: 192.168.20.71
    installDisk: /dev/sda
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: bc:24:11:33:6e:7a
        dhcp: false
        addresses:
          - 192.168.20.71/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.20.1
        mtu: 1500
        vip: &vip
          ip: ${clusterEndpointIP}
      - deviceSelector:
          hardwareAddr: bc:24:11:63:9c:23
        dhcp: false
        addresses:
          - 10.0.100.71/24
        routes:
          - network: 10.0.100.0/24
            gateway: 10.0.100.1
        mtu: 1500
  - hostname: k8s-dev-2
    ipAddress: 192.168.20.72
    installDisk: /dev/sda
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: bc:24:11:bb:d2:88
        dhcp: false
        addresses:
          - 192.168.20.72/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.20.1
        mtu: 1500
        vip: *vip
      - deviceSelector:
          hardwareAddr: bc:24:11:d4:79:5d
        dhcp: false
        addresses:
          - 10.0.100.72/24
        routes:
          - network: 10.0.100.0/24
            gateway: 10.0.100.1
        mtu: 1500
  - hostname: k8s-dev-3
    ipAddress: 192.168.20.73
    installDisk: /dev/sda
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: bc:24:11:18:3e:9f
        dhcp: false
        addresses:
          - 192.168.20.73/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.20.1
        mtu: 1500
        vip: *vip
      - deviceSelector:
          hardwareAddr: bc:24:11:43:01:ad
        dhcp: false
        addresses:
          - 10.0.100.73/24
        routes:
          - network: 10.0.100.0/24
            gateway: 10.0.100.1
        mtu: 1500
  - hostname: k8s-dev-4
    ipAddress: 192.168.20.74
    installDisk: /dev/sda
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: bc:24:11:1f:24:92
        dhcp: false
        addresses:
          - 192.168.20.74/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.20.1
        mtu: 1500
      - deviceSelector:
          hardwareAddr: bc:24:11:51:bf:62
        dhcp: false
        addresses:
          - 10.0.100.74/24
        routes:
          - network: 10.0.100.0/24
            gateway: 10.0.100.1
        mtu: 1500
  - hostname: k8s-dev-5
    ipAddress: 192.168.20.75
    installDisk: /dev/sda
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: bc:24:11:33:af:3f
        dhcp: false
        addresses:
          - 192.168.20.75/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.20.1
        mtu: 1500
      - deviceSelector:
          hardwareAddr: bc:24:11:db:96:fc
        dhcp: false
        addresses:
          - 10.0.100.75/24
        routes:
          - network: 10.0.100.0/24
            gateway: 10.0.100.1
        mtu: 1500

# Global configurations and patches.
patches:
  - "@./patches/global/cluster-discovery.yaml"
  - "@./patches/global/containerd.yaml"
  - "@./patches/global/disable-search-domain.yaml"
  - "@./patches/global/dns.yaml"
  - "@./patches/global/hostdns.yaml"
  - "@./patches/global/kubelet.yaml"
  - "@./patches/global/ntp.yaml"
  - "@./patches/global/openebs-local.yaml"
  - "@./patches/global/sysctl.yaml"

# Controller configurations and patches.
controlPlane:
  schematic: &schematic
    customization:
      extraKernelArgs:
        - net.ifnames=0
      systemExtensions:
        officialExtensions:
          - siderolabs/amd-ucode
          - siderolabs/iscsi-tools
          - siderolabs/qemu-guest-agent
          - siderolabs/util-linux-tools
  patches:
    - "@./patches/controller/api-access.yaml"
    - "@./patches/controller/cluster.yaml"
    - "@./patches/controller/disable-admission-controller.yaml"
    - "@./patches/controller/etcd.yaml"

# Worker configurations and patches.
worker:
  schematic: *schematic
